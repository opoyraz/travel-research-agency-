<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Research Agency — Graph Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111827;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: 'DM Sans', sans-serif;
  }

  .diagram-wrapper {
    width: 100%;
    max-width: 1100px;
  }

  .diagram-title {
    text-align: center;
    margin-bottom: 32px;
  }

  .diagram-title h1 {
    font-size: 28px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: -0.5px;
  }

  .diagram-title p {
    font-size: 14px;
    color: #64748b;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 4px 40px rgba(0,0,0,0.3));
  }

  /* Animations */
  @keyframes flowPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @keyframes nodeAppear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .node-group {
    animation: nodeAppear 0.5s ease-out both;
  }

  .flow-line { animation: flowPulse 3s ease-in-out infinite; }
</style>
</head>
<body>

<div class="diagram-wrapper">
  <div class="diagram-title">
    <h1>Travel Research Agency — LangGraph Flow</h1>
    <p>14 nodes · 3 routing mechanisms · 6 batches</p>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>Orchestration</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Agents</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Guardrails</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Human-in-the-Loop</div>
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Memory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9ca3af"></div>Terminal</div>
  </div>

  <svg viewBox="0 0 1000 1520" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Arrows -->
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
      </marker>
      <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fca5a5"/>
      </marker>
      <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcd34d"/>
      </marker>
      <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#6ee7b7"/>
      </marker>

      <!-- Glow filters -->
      <filter id="glow-blue"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60a5fa" flood-opacity="0.3"/></filter>
      <filter id="glow-purple"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.3"/></filter>
      <filter id="glow-red"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f87171" flood-opacity="0.3"/></filter>
      <filter id="glow-amber"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fbbf24" flood-opacity="0.3"/></filter>
      <filter id="glow-green"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#34d399" flood-opacity="0.3"/></filter>
    </defs>

    <!-- Background -->
    <rect width="1000" height="1520" rx="16" fill="#1a2035"/>

    <!-- ═══════════ CONNECTIONS (draw first, behind nodes) ═══════════ -->

    <!-- START → load_user_prefs -->
    <line x1="500" y1="55" x2="500" y2="85" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- load_user_prefs → input_guard -->
    <line x1="500" y1="135" x2="500" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- input_guard → injection_guard (pass) -->
    <line x1="500" y1="215" x2="500" y2="255" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="518" y="240" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">pass</text>

    <!-- input_guard → END (block) -->
    <line x1="640" y1="190" x2="740" y2="190" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
    <text x="670" y="183" fill="#fca5a5" font-size="10" font-family="JetBrains Mono" font-weight="500">block</text>
    <rect x="745" y="177" width="50" height="26" rx="6" fill="#2a2a3e" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="770" y="194" fill="#d1d5db" font-size="11" font-family="DM Sans" font-weight="600" text-anchor="middle">END</text>

    <!-- injection_guard → SUPERVISOR (safe) -->
    <line x1="500" y1="305" x2="500" y2="345" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="518" y="330" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">safe</text>

    <!-- injection_guard → END (blocked) -->
    <line x1="640" y1="280" x2="740" y2="280" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
    <text x="660" y="273" fill="#fca5a5" font-size="10" font-family="JetBrains Mono" font-weight="500">blocked</text>
    <rect x="745" y="267" width="50" height="26" rx="6" fill="#2a2a3e" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="770" y="284" fill="#d1d5db" font-size="11" font-family="DM Sans" font-weight="600" text-anchor="middle">END</text>

    <!-- SUPERVISOR fan-out to 3 agents -->
    <line x1="500" y1="400" x2="500" y2="430" stroke="#64748b" stroke-width="2"/>
    <!-- Branch lines -->
    <path d="M 500 430 L 220 430 L 220 455" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M 500 430 L 500 455" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M 500 430 L 780 430 L 780 455" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- researcher → supervisor -->
    <path d="M 220 510 L 220 540 L 360 540 L 360 570 L 360 540 L 500 540 L 500 560" stroke="#64748b" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
    <line x1="360" y1="540" x2="360" y2="570" stroke="none"/>

    <!-- experience → supervisor -->
    <line x1="500" y1="510" x2="500" y2="560" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Return arrow to supervisor -->
    <text x="365" y="555" fill="#94a3b8" font-size="9" font-family="JetBrains Mono">→ supervisor</text>

    <!-- safety_analyst → factuality_guard -->
    <line x1="780" y1="510" x2="780" y2="555" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- factuality_guard retry → safety_analyst -->
    <path d="M 880 580 Q 920 580 920 500 Q 920 475 880 475" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
    <text x="930" y="530" fill="#fca5a5" font-size="10" font-family="JetBrains Mono" font-weight="500">retry</text>
    <text x="930" y="543" fill="#fca5a580" font-size="9" font-family="JetBrains Mono">(max 2)</text>

    <!-- factuality_guard pass → supervisor (second instance) -->
    <path d="M 780 605 L 780 640 L 500 640 L 500 660" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="640" y="635" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">pass</text>

    <!-- SUPERVISOR 2 → budget_optimizer -->
    <line x1="500" y1="715" x2="500" y2="755" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- budget_optimizer → budget_check -->
    <line x1="500" y1="810" x2="500" y2="850" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- budget_check → cancel END -->
    <line x1="640" y1="880" x2="740" y2="880" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
    <text x="660" y="873" fill="#fcd34d" font-size="10" font-family="JetBrains Mono" font-weight="500">cancel</text>
    <rect x="745" y="867" width="50" height="26" rx="6" fill="#2a2a3e" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="770" y="884" fill="#d1d5db" font-size="11" font-family="DM Sans" font-weight="600" text-anchor="middle">END</text>

    <!-- budget_check → find_cheaper loop -->
    <path d="M 360 880 Q 300 880 300 800 Q 300 775 360 775" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
    <text x="245" y="830" fill="#fcd34d" font-size="10" font-family="JetBrains Mono" font-weight="500">find_cheaper</text>

    <!-- budget_check → writer (approve) -->
    <line x1="500" y1="910" x2="500" y2="955" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="518" y="940" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">approve</text>

    <!-- writer → final_approval -->
    <line x1="500" y1="1010" x2="500" y2="1055" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- final_approval → cancel END -->
    <line x1="640" y1="1080" x2="740" y2="1080" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-amber)"/>
    <text x="660" y="1073" fill="#fcd34d" font-size="10" font-family="JetBrains Mono" font-weight="500">cancel</text>
    <rect x="745" y="1067" width="50" height="26" rx="6" fill="#2a2a3e" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="770" y="1084" fill="#d1d5db" font-size="11" font-family="DM Sans" font-weight="600" text-anchor="middle">END</text>

    <!-- final_approval → request_changes loop -->
    <path d="M 360 1080 Q 300 1080 300 1000 Q 300 975 360 975" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>
    <text x="220" y="1030" fill="#fcd34d" font-size="10" font-family="JetBrains Mono" font-weight="500">request_changes</text>

    <!-- final_approval → output_guard (approve) -->
    <line x1="500" y1="1110" x2="500" y2="1155" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="518" y="1140" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">approve</text>

    <!-- output_guard retry → writer -->
    <path d="M 360 1180 Q 280 1180 280 1000 Q 280 975 360 975" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
    <text x="230" y="1100" fill="#fca5a5" font-size="10" font-family="JetBrains Mono" font-weight="500">retry</text>

    <!-- output_guard → save_preferences -->
    <line x1="500" y1="1210" x2="500" y2="1255" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="518" y="1240" fill="#6ee7b7" font-size="10" font-family="JetBrains Mono" font-weight="500">pass</text>

    <!-- save_preferences → END -->
    <line x1="500" y1="1310" x2="500" y2="1350" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>


    <!-- ═══════════ NODES ═══════════ -->

    <!-- START -->
    <g class="node-group" style="animation-delay: 0s">
      <circle cx="500" cy="38" r="18" fill="#1e3a6e" stroke="#60a5fa" stroke-width="2" filter="url(#glow-blue)"/>
      <text x="500" y="43" fill="#93c5fd" font-size="12" font-family="DM Sans" font-weight="700" text-anchor="middle">START</text>
    </g>

    <!-- load_user_prefs (Memory) -->
    <g class="node-group" style="animation-delay: 0.05s">
      <rect x="400" y="90" width="200" height="40" rx="8" fill="#143d2b" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
      <text x="500" y="115" fill="#6ee7b7" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">load_user_prefs</text>
    </g>

    <!-- input_guard (Guardrail) -->
    <g class="node-group" style="animation-delay: 0.1s">
      <rect x="400" y="170" width="200" height="40" rx="8" fill="#3b1515" stroke="#f87171" stroke-width="1.5" filter="url(#glow-red)"/>
      <text x="500" y="195" fill="#fca5a5" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">input_guard</text>
    </g>

    <!-- injection_guard (Guardrail) -->
    <g class="node-group" style="animation-delay: 0.15s">
      <rect x="400" y="260" width="200" height="40" rx="8" fill="#3b1515" stroke="#f87171" stroke-width="1.5" filter="url(#glow-red)"/>
      <text x="500" y="285" fill="#fca5a5" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">injection_guard</text>
    </g>

    <!-- SUPERVISOR (Orchestration) -->
    <g class="node-group" style="animation-delay: 0.2s">
      <rect x="400" y="350" width="200" height="48" rx="10" fill="#1e3a6e" stroke="#60a5fa" stroke-width="2" filter="url(#glow-blue)"/>
      <text x="500" y="370" fill="#93c5fd" font-size="14" font-family="DM Sans" font-weight="700" text-anchor="middle">SUPERVISOR</text>
      <text x="500" y="386" fill="#93c5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Command(goto=...)</text>
    </g>

    <!-- researcher (Agent) -->
    <g class="node-group" style="animation-delay: 0.25s">
      <rect x="120" y="460" width="200" height="48" rx="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-purple)"/>
      <text x="220" y="480" fill="#c4b5fd" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">researcher</text>
      <text x="220" y="496" fill="#c4b5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Groq · Llama 3.3 70B</text>
    </g>

    <!-- experience (Agent) -->
    <g class="node-group" style="animation-delay: 0.3s">
      <rect x="400" y="460" width="200" height="48" rx="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-purple)"/>
      <text x="500" y="480" fill="#c4b5fd" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">experience</text>
      <text x="500" y="496" fill="#c4b5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Gemini 2.0 Flash</text>
    </g>

    <!-- safety_analyst (Agent) -->
    <g class="node-group" style="animation-delay: 0.35s">
      <rect x="680" y="460" width="200" height="48" rx="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-purple)"/>
      <text x="780" y="480" fill="#c4b5fd" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">safety_analyst</text>
      <text x="780" y="496" fill="#c4b5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Gemini + RAG</text>
    </g>

    <!-- factuality_guard (Guardrail) -->
    <g class="node-group" style="animation-delay: 0.4s">
      <rect x="680" y="560" width="200" height="40" rx="8" fill="#3b1515" stroke="#f87171" stroke-width="1.5" filter="url(#glow-red)"/>
      <text x="780" y="585" fill="#fca5a5" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">factuality_guard</text>
    </g>

    <!-- SUPERVISOR 2 -->
    <g class="node-group" style="animation-delay: 0.45s">
      <rect x="400" y="665" width="200" height="48" rx="10" fill="#1e3a6e" stroke="#60a5fa" stroke-width="2" filter="url(#glow-blue)"/>
      <text x="500" y="685" fill="#93c5fd" font-size="14" font-family="DM Sans" font-weight="700" text-anchor="middle">SUPERVISOR</text>
      <text x="500" y="701" fill="#93c5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">routes to budget/writer</text>
    </g>

    <!-- budget_optimizer (Agent) -->
    <g class="node-group" style="animation-delay: 0.5s">
      <rect x="400" y="760" width="200" height="48" rx="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-purple)"/>
      <text x="500" y="780" fill="#c4b5fd" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">budget_optimizer</text>
      <text x="500" y="796" fill="#c4b5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Groq · Llama 3.3 70B</text>
    </g>

    <!-- budget_check (HITL) -->
    <g class="node-group" style="animation-delay: 0.55s">
      <rect x="400" y="855" width="200" height="50" rx="8" fill="#3b2c08" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow-amber)"/>
      <text x="500" y="876" fill="#fcd34d" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">budget_check</text>
      <text x="500" y="894" fill="#fcd34d80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">HITL · interrupt()</text>
    </g>

    <!-- writer (Agent) -->
    <g class="node-group" style="animation-delay: 0.6s">
      <rect x="400" y="960" width="200" height="48" rx="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-purple)"/>
      <text x="500" y="980" fill="#c4b5fd" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">writer</text>
      <text x="500" y="996" fill="#c4b5fd80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">Claude Sonnet 4.5</text>
    </g>

    <!-- final_approval (HITL) -->
    <g class="node-group" style="animation-delay: 0.65s">
      <rect x="400" y="1055" width="200" height="50" rx="8" fill="#3b2c08" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow-amber)"/>
      <text x="500" y="1076" fill="#fcd34d" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">final_approval</text>
      <text x="500" y="1094" fill="#fcd34d80" font-size="10" font-family="JetBrains Mono" text-anchor="middle">HITL · interrupt()</text>
    </g>

    <!-- output_guard (Guardrail) -->
    <g class="node-group" style="animation-delay: 0.7s">
      <rect x="400" y="1160" width="200" height="40" rx="8" fill="#3b1515" stroke="#f87171" stroke-width="1.5" filter="url(#glow-red)"/>
      <text x="500" y="1185" fill="#fca5a5" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">output_guard</text>
    </g>

    <!-- save_preferences (Memory) -->
    <g class="node-group" style="animation-delay: 0.75s">
      <rect x="400" y="1260" width="200" height="40" rx="8" fill="#143d2b" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
      <text x="500" y="1285" fill="#6ee7b7" font-size="13" font-family="DM Sans" font-weight="600" text-anchor="middle">save_preferences</text>
    </g>

    <!-- END -->
    <g class="node-group" style="animation-delay: 0.8s">
      <circle cx="500" cy="1370" r="18" fill="#1e293b" stroke="#9ca3af" stroke-width="2"/>
      <text x="500" y="1375" fill="#d1d5db" font-size="12" font-family="DM Sans" font-weight="700" text-anchor="middle">END</text>
    </g>

    <!-- ═══════════ ROUTING LABELS ═══════════ -->

    <!-- Routing mechanism annotations -->
    <g opacity="0.5">
      <rect x="30" y="355" width="130" height="42" rx="6" fill="#1e3a6e" stroke="#60a5fa40" stroke-width="1"/>
      <text x="95" y="373" fill="#93c5fd" font-size="9" font-family="JetBrains Mono" font-weight="500" text-anchor="middle">Command routing</text>
      <text x="95" y="387" fill="#93c5fd80" font-size="9" font-family="JetBrains Mono" text-anchor="middle">dynamic · no edges</text>
    </g>

    <g opacity="0.5">
      <rect x="30" y="175" width="130" height="42" rx="6" fill="#2a0f0f" stroke="#f8717140" stroke-width="1"/>
      <text x="95" y="193" fill="#fca5a5" font-size="9" font-family="JetBrains Mono" font-weight="500" text-anchor="middle">Conditional edges</text>
      <text x="95" y="207" fill="#fca5a580" font-size="9" font-family="JetBrains Mono" text-anchor="middle">state-based branching</text>
    </g>

    <g opacity="0.5">
      <rect x="30" y="465" width="130" height="42" rx="6" fill="#2d1b69" stroke="#a78bfa40" stroke-width="1"/>
      <text x="95" y="483" fill="#c4b5fd" font-size="9" font-family="JetBrains Mono" font-weight="500" text-anchor="middle">Fixed edges</text>
      <text x="95" y="497" fill="#c4b5fd80" font-size="9" font-family="JetBrains Mono" text-anchor="middle">agent → supervisor</text>
    </g>

  </svg>
</div>

</body>
</html>
