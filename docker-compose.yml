# ═══════════════════════════════════════════════
#  Travel Research Agency — Docker Compose
#  Runs: FastAPI app + Postgres (checkpointer) + Qdrant (RAG)
#
#  Usage:
#    docker compose up -d
#    docker compose logs -f app
#    docker compose down -v
# ═══════════════════════════════════════════════

services:

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travel_agency
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
